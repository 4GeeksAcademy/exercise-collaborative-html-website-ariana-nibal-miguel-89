<div class="container py-5 bg-white">
  <h2 class="my-2">Contact</h2>
  <p class="card-text">
    Some quick example text to build on the card title and make up the bulk of
    the card’s content.
  </p>

  <div class="container">
    <div class="col-8 container py-5 border border-dark rounded bg-white">
      <div class="row">
        <div class="col-4">
          <div class="d-flex justify-content-end  ">
            <h6 class="p-0 text-end me-2 " for="firstNameInput"
              >Your E-mail
          </h6>
          </div>

          <div class="d-flex justify-content-end mt-4 ">
            <h6 class="text-end p-0 me-2" for="cityInput">
              Your Message
            </h6>
          </div>
        </div>
        <div class="col-8">
          <div class=" pe-2 ">
            <input
              class="form-control border border-secondary w-100 col-9"
              type="text"
              name="firstNameInput"
              id="firstNameInput"
              placeholder="Your email"
            />
          </div>
          <div class="pe-2 mt-3">
            <div>
            <textarea
              class="form-control border border-secondary w-100 col-9 "
              type="text"
              name="cityInput"
              id="cityInput"
              placeholder="Please enter your message here..."
            >
            </textarea> </div>
          </div>
        </div>
        <div class="d-flex me-auto p-2">
          <a href="#" class="ms-auto p-2 my-5 btn btn-primary">Submit</a>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
